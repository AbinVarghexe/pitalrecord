name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
      - master
      - develop  # Add other branches you want to auto-deploy
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Build and push Docker image to GHCR
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/pitalrecord
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Building and pushing to GitHub Container Registry..."
          echo "Image: $IMAGE_NAME:$IMAGE_TAG"
          
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            -t $IMAGE_NAME:$IMAGE_TAG \
            -t $IMAGE_NAME:latest \
            -f Dockerfile .
          
          echo "Pushing images..."
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest
          
          echo "✅ Images pushed successfully!"
          echo "  - $IMAGE_NAME:$IMAGE_TAG"
          echo "  - $IMAGE_NAME:latest"
      
      - name: Deploy to EC2
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/pitalrecord
          IMAGE_TAG: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Save private key to file
          echo "$PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem
          
          # Deploy via SSH
          ssh -o StrictHostKeyChecking=no -i private_key.pem ${USER}@${HOST} << 'EOF'
            # Login to GitHub Container Registry
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Navigate to app directory
            cd /home/${USER}/pitalrecord || exit 1
            
            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            
            # Pull latest image
            docker pull ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_NAME }}:latest
            
            # Stop and remove old container
            docker-compose down || true
            
            # Start new container
            docker-compose up -d
            
            # Clean up old images
            docker image prune -af
            
            echo "Deployment completed successfully!"
          EOF
          
          # Clean up private key
          rm -f private_key.pem
      
      - name: Verify deployment
        env:
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          sleep 10
          curl -f http://${HOST}/health || curl -f http://${HOST}/ || exit 1
          echo "Application is running successfully!"
      
      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi
