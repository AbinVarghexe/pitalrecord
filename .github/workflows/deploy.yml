name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
      - master
      - develop  # Add other branches you want to auto-deploy
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Build and push Docker image to GHCR
        env:
          IMAGE_NAME: ghcr.io/abinvarghexe/pitalrecord
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Building and pushing to GitHub Container Registry..."
          echo "Image: $IMAGE_NAME:$IMAGE_TAG"
          
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            -t $IMAGE_NAME:$IMAGE_TAG \
            -t $IMAGE_NAME:latest \
            -f Dockerfile .
          
          echo "Pushing images..."
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest
          
          echo "✅ Images pushed successfully!"
          echo "  - $IMAGE_NAME:$IMAGE_TAG"
          echo "  - $IMAGE_NAME:latest"
      
      - name: Deploy to EC2
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
          IMAGE_NAME: ghcr.io/abinvarghexe/pitalrecord
          IMAGE_TAG: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Save private key to file with proper formatting
          echo "$PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem
          
          # Test SSH connection
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i private_key.pem ${USER}@${HOST} "echo 'SSH connection successful'"
          
          # Deploy via SSH - Pass variables into the SSH session
          ssh -o StrictHostKeyChecking=no -i private_key.pem ${USER}@${HOST} \
            IMAGE_NAME="${IMAGE_NAME}" \
            GITHUB_TOKEN="${GITHUB_TOKEN}" \
            GITHUB_ACTOR="${{ github.actor }}" \
            bash << 'EOF'
            # Login to GitHub Container Registry
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u ${GITHUB_ACTOR} --password-stdin
            
            # Navigate to app directory
            cd ~/pitalrecord || mkdir -p ~/pitalrecord && cd ~/pitalrecord
            
            # Pull latest image from GHCR
            echo "Pulling image: ${IMAGE_NAME}:latest"
            docker pull ${IMAGE_NAME}:latest
            
            # Stop and remove old containers
            docker-compose down 2>/dev/null || true
            
            # Export image name for docker-compose
            export IMAGE_NAME=${IMAGE_NAME}
            
            # Start containers
            docker-compose up -d --force-recreate
            
            # Clean up old images
            docker image prune -af --filter "until=24h"
            
            echo "✅ Deployment completed successfully!"
          EOF
          
          # Clean up private key
          rm -f private_key.pem
      
      - name: Verify deployment
        env:
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          sleep 10
          curl -f http://${HOST}/health || curl -f http://${HOST}/ || exit 1
          echo "Application is running successfully!"
      
      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi
